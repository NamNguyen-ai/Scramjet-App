# Wireproxy config template.
#
# Copy this file once per WireGuard peer you have access to:
#   cp example.conf peer1.conf
#   cp example.conf peer2.conf
#   cp example.conf peer3.conf
#
# Replace the placeholders in each copy with real values from your WG provider.
# Each peer must egress from a DIFFERENT public IP for rotation to be useful.
#
# This file itself is a template and will fail to start wireproxy as-is.

[Interface]
Address = 10.0.0.2/32
PrivateKey = <client-private-key>
DNS = 1.1.1.1
MTU = 1420

[Peer]
PublicKey = <server-public-key>
Endpoint = <server-public-ip>:51820
AllowedIPs = 0.0.0.0/0
PersistentKeepalive = 25

# SOCKS5 listener consumed by the Scramjet server. Do not change the port --
# docker-compose maps each container's internal 25344 to a distinct service
# name on the egress network.
[Socks5]
BindAddress = 0.0.0.0:25344
